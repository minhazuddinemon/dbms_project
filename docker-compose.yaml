services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: database
      DB_USER: gopher
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: demo_db
    depends_on:
      - database

    # ─── ADD THESE TWO VOLUMES FOR INSTANT REBUILD SPEEDS ───
    volumes:
      - ./backend:/app
      - go_build_cache:/root/.cache/go-build
      - go_mod_cache:/go/pkg/mod

  database:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gopher
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: demo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  # ─── DECLARE THE GO CACHE VOLUMES AT THE BOTTOM ───
  go_build_cache:
  go_mod_cache:
